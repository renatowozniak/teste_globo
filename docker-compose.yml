version: '3.8'

services:
  app-python:
    build: ./app-python
    restart: always

  app-node:
    build: ./app-node
    restart: always

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - cache_data:/var/cache/nginx
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      - app-python
      - app-node
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  cache_data: