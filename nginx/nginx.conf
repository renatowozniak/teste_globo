# nginx/nginx.conf
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g;

server {
    listen 80;

    # --- MÉTODO 1: CACHE NO NGINX (DISCO) ---
    location /app1/hora {
        proxy_cache my_cache;
        proxy_cache_valid 200 10s;
        proxy_pass http://app-python:5001/hora;
        add_header X-Cache-Engine "Nginx-Disk-Cache";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /app2/hora {
        proxy_cache my_cache;
        proxy_cache_valid 200 60s;
        proxy_pass http://app-node:5002/hora;
        add_header X-Cache-Engine "Nginx-Disk-Cache";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --- MÉTODO 2: CACHE NO REDIS (MEMÓRIA/APP) ---
    # Aqui o Nginx não faz cache, ele apenas entrega para a app gerenciar no Redis
    location /app1/hora-redis {
        proxy_pass http://app-python:5001/hora-redis;
        add_header X-Cache-Engine "Redis-App-Cache";
    }

    location /app2/hora-redis {
        proxy_pass http://app-node:5002/hora-redis;
        add_header X-Cache-Engine "Redis-App-Cache";
    }

    # Rotas de texto (sem cache conforme desafio original)
    location /app1/texto { proxy_pass http://app-python:5001/texto; }
    location /app2/texto { proxy_pass http://app-node:5002/texto; }
}
